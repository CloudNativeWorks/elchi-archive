name: Download Elchi Client

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Elchi Client version to download (e.g., v1.0.0)'
        required: true
        type: string
      shield_version:
        description: 'elchi-shield version to bundle + pin into the installer (e.g., v0.2.0; blank = installer fetches latest at install time)'
        required: false
        type: string
        default: ''

env:
  # Belt-and-suspenders: forces every JS action to run on Node.js 24 even
  # if its action.yml still declares node20. Drop this block once every
  # action used here ships a native Node 24 manifest.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "elchi-archive-publish"
  cancel-in-progress: false

jobs:
  download-files:
    runs-on: ubuntu-latest
    outputs:
      # The resolved shield version (input, or the latest tag when blank).
      # Downstream jobs use this for index.json + the release notes.
      shield_version: ${{ steps.fetch.outputs.shield_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Download Elchi Client + Shield from the private source repos
        id: fetch
        env:
          # The default GITHUB_TOKEN is scoped to elchi-archive only and cannot
          # read the private elchi-client / elchi-shield repos — a cross-repo PAT
          # is required. gh authenticates with GH_TOKEN. Everything we pull here
          # is re-published into the PUBLIC elchi-archive release below so the
          # installer's unauthenticated, install-time downloads work.
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          set -euo pipefail
          VERSION="${{ github.event.inputs.version }}"
          CLIENT_REPO="CloudNativeWorks/elchi-client"
          SHIELD_REPO="CloudNativeWorks/elchi-shield"
          ARCHIVE_TAG="elchi-client-${VERSION}"
          # The installer downloads its binaries from this elchi-archive release
          # (public, unauthenticated) at install time — never from a source repo.
          MIRROR_BASE_URL="https://github.com/${{ github.repository }}/releases/download/${ARCHIVE_TAG}"

          mkdir -p "releases/${ARCHIVE_TAG}"
          cd "releases/${ARCHIVE_TAG}"

          # --- elchi-client binary + installer (private client repo) ----------
          echo "Downloading elchi-client ${VERSION} from ${CLIENT_REPO}..."
          gh release download "${VERSION}" --repo "${CLIENT_REPO}" \
            --pattern "elchi-client-linux-amd64" \
            --pattern "elchi-install.sh"
          # Verify against the upstream checksum when one is published.
          if gh release download "${VERSION}" --repo "${CLIENT_REPO}" \
               --pattern "elchi-client-linux-amd64.sha256" 2>/dev/null; then
            sha256sum -c elchi-client-linux-amd64.sha256
            rm -f elchi-client-linux-amd64.sha256
          fi

          # --- elchi-shield: resolve version (latest when blank) + fetch -------
          # Shield is ALWAYS bundled so the public mirror is always populated and
          # default installs get a working sidecar (no private fetch at install).
          SHIELD_VERSION="${{ github.event.inputs.shield_version }}"
          if [[ -z "$SHIELD_VERSION" ]]; then
            SHIELD_VERSION=$(gh release view --repo "${SHIELD_REPO}" --json tagName -q .tagName)
            echo "Resolved latest elchi-shield: ${SHIELD_VERSION}"
          fi
          # shield's create-release.yml builds elchi-shield-v<X.Y.Z>-linux-amd64.
          SHIELD_ASSET="elchi-shield-${SHIELD_VERSION}-linux-amd64"
          echo "Downloading ${SHIELD_ASSET} from ${SHIELD_REPO}@${SHIELD_VERSION}..."
          gh release download "${SHIELD_VERSION}" --repo "${SHIELD_REPO}" \
            --pattern "${SHIELD_ASSET}" \
            --pattern "${SHIELD_ASSET}.sha256"
          sha256sum -c "${SHIELD_ASSET}.sha256"
          # Re-name to the version-less asset the installer expects
          # (elchi-shield-linux-amd64), then regenerate the checksum for it.
          mv "${SHIELD_ASSET}" elchi-shield-linux-amd64
          rm -f "${SHIELD_ASSET}.sha256"

          # --- pin the version + the public mirror base into the installer -----
          echo "Pinning shield ${SHIELD_VERSION} + mirror base into elchi-install.sh"
          sed -i "s|^SHIELD_VERSION=\"__SHIELD_VERSION__\"|SHIELD_VERSION=\"${SHIELD_VERSION}\"|" elchi-install.sh
          sed -i "s|^MIRROR_BASE_URL=\"__MIRROR_BASE_URL__\"|MIRROR_BASE_URL=\"${MIRROR_BASE_URL}\"|" elchi-install.sh
          grep -q "^SHIELD_VERSION=\"${SHIELD_VERSION}\"" elchi-install.sh || { echo "::error::shield version pin failed"; exit 1; }
          grep -q "^MIRROR_BASE_URL=" elchi-install.sh && ! grep -q "__MIRROR_BASE_URL__" elchi-install.sh || { echo "::error::mirror base pin failed"; exit 1; }

          # --- regenerate our own checksums (after substitution) + perms ------
          sha256sum elchi-client-linux-amd64 > elchi-client-linux-amd64.sha256
          sha256sum elchi-shield-linux-amd64 > elchi-shield-linux-amd64.sha256
          sha256sum elchi-install.sh        > elchi-install.sh.sha256
          chmod +x elchi-client-linux-amd64 elchi-shield-linux-amd64 elchi-install.sh

          # Expose the resolved shield version to downstream jobs.
          echo "shield_version=${SHIELD_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Upload artifacts
        uses: actions/upload-artifact@v5
        with:
          name: elchi-client-${{ github.event.inputs.version }}
          path: releases/elchi-client-${{ github.event.inputs.version }}/*

  update-index:
    needs: download-files
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@v5
        with:
          name: elchi-client-${{ github.event.inputs.version }}
          path: releases/elchi-client-${{ github.event.inputs.version }}

      - name: Update index.json
        run: |
          VERSION="${{ github.event.inputs.version }}"
          SHIELD_VERSION="${{ needs.download-files.outputs.shield_version }}"
          RELDIR="releases/elchi-client-${VERSION}"
          REPO="${{ github.repository }}"
          TAG="elchi-client-${VERSION}"

          # Read checksums
          BINARY_SHA256=$(cut -d' ' -f1 "$RELDIR/elchi-client-linux-amd64.sha256")
          SCRIPT_SHA256=$(cut -d' ' -f1 "$RELDIR/elchi-install.sh.sha256")

          # Base files: client binary + installer (which now also installs shield).
          FILES=$(cat <<EOF
              {
                "name": "elchi-client-linux-amd64",
                "type": "binary",
                "download_url": "https://github.com/${REPO}/releases/download/${TAG}/elchi-client-linux-amd64",
                "sha256": "$BINARY_SHA256"
              },
              {
                "name": "elchi-install.sh",
                "type": "script",
                "download_url": "https://github.com/${REPO}/releases/download/${TAG}/elchi-install.sh",
                "sha256": "$SCRIPT_SHA256"
              }
          EOF
          )
          # Append the bundled shield binary when a shield_version was given.
          if [[ -f "$RELDIR/elchi-shield-linux-amd64" ]]; then
            SHIELD_SHA256=$(cut -d' ' -f1 "$RELDIR/elchi-shield-linux-amd64.sha256")
            FILES="${FILES},
              {
                \"name\": \"elchi-shield-linux-amd64\",
                \"type\": \"binary\",
                \"description\": \"elchi-shield ${SHIELD_VERSION} (Envoy ext_proc WAF sidecar) bundled with this client release\",
                \"download_url\": \"https://github.com/${REPO}/releases/download/${TAG}/elchi-shield-linux-amd64\",
                \"sha256\": \"$SHIELD_SHA256\"
              }"
          fi

          # Create new Elchi Client release entry
          cat > temp_elchi_release.json << EOF
          {
            "version": "${VERSION}",
            "date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "shield_version": "${SHIELD_VERSION}",
            "files": [
          ${FILES}
            ]
          }
          EOF

          # Separate elchi-shield entry for its own download card (the binary is
          # bundled in this client release; the card just links to it).
          if [[ -f "$RELDIR/elchi-shield-linux-amd64" ]]; then
            cat > temp_shield_release.json << EOF
          {
            "version": "${SHIELD_VERSION}",
            "date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "files": [
              {
                "name": "elchi-shield-linux-amd64",
                "type": "binary",
                "description": "elchi-shield (Envoy ext_proc API-security / WAF sidecar) bundled with Elchi Client ${VERSION}",
                "download_url": "https://github.com/${REPO}/releases/download/${TAG}/elchi-shield-linux-amd64",
                "sha256": "$SHIELD_SHA256"
              }
            ]
          }
          EOF
          fi

          # Update index.json with separate Elchi Client releases section
          python3 << 'EOF'
          import json

          # Read existing index
          try:
              with open('index.json', 'r') as f:
                  index = json.load(f)
          except:
              index = {"releases": []}

          # Ensure elchi_client_releases key exists
          if 'elchi_client_releases' not in index:
              index['elchi_client_releases'] = []

          # Read new Elchi Client release
          with open('temp_elchi_release.json', 'r') as f:
              new_release = json.load(f)

          # Update if same version exists, otherwise add
          existing = False
          for i, release in enumerate(index['elchi_client_releases']):
              if release['version'] == new_release['version']:
                  index['elchi_client_releases'][i] = new_release
                  existing = True
                  break

          if not existing:
              index['elchi_client_releases'].append(new_release)

          # Sort by version (newest to oldest)
          index['elchi_client_releases'].sort(key=lambda x: x['version'], reverse=True)

          # Elchi Shield release (separate download card) — only when one was bundled.
          import os
          if os.path.exists('temp_shield_release.json'):
              if 'elchi_shield_releases' not in index:
                  index['elchi_shield_releases'] = []
              with open('temp_shield_release.json', 'r') as f:
                  shield_release = json.load(f)
              if shield_release.get('version'):
                  sh_existing = False
                  for i, release in enumerate(index['elchi_shield_releases']):
                      if release['version'] == shield_release['version']:
                          index['elchi_shield_releases'][i] = shield_release
                          sh_existing = True
                          break
                  if not sh_existing:
                      index['elchi_shield_releases'].append(shield_release)
                  index['elchi_shield_releases'].sort(key=lambda x: x['version'], reverse=True)

          # Save
          with open('index.json', 'w') as f:
              json.dump(index, f, indent=2)
          EOF

      - name: Remove existing release (allow same-version re-publish)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release delete "elchi-client-${{ github.event.inputs.version }}" --yes 2>/dev/null || true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: elchi-client-${{ github.event.inputs.version }}
          name: Elchi Client ${{ github.event.inputs.version }}
          body: |
            Elchi Client ${{ github.event.inputs.version }}

            Downloaded from: https://github.com/CloudNativeWorks/elchi-client/releases/tag/${{ github.event.inputs.version }}

            This installer ALSO installs the **elchi-shield** sidecar (Envoy ext_proc
            API-security / WAF) in the same run — bundled shield version:
            `${{ needs.download-files.outputs.shield_version }}` (fetched from this
            same release at install time). Use `--no-shield` to skip it.

            ## Quick Install

            ```bash
            # Download installer
            wget https://github.com/${{ github.repository }}/releases/download/elchi-client-${{ github.event.inputs.version }}/elchi-install.sh

            # Run with your configuration (installs elchi-client + elchi-shield)
            sudo bash elchi-install.sh \
              --name=web-server-01 \
              --host=backend.elchi.io \
              --port=443 \
              --tls=true \
              --token=your-auth-token
            ```

            ## Manual Installation

            ```bash
            wget https://github.com/${{ github.repository }}/releases/download/elchi-client-${{ github.event.inputs.version }}/elchi-client-linux-amd64
            sudo mv elchi-client-linux-amd64 /usr/local/bin/elchi-client
            sudo chmod +x /usr/local/bin/elchi-client
            ```
          files: |
            releases/elchi-client-${{ github.event.inputs.version }}/elchi-client-linux-amd64
            releases/elchi-client-${{ github.event.inputs.version }}/elchi-install.sh
            releases/elchi-client-${{ github.event.inputs.version }}/elchi-shield-linux-amd64
            releases/elchi-client-${{ github.event.inputs.version }}/*.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add index.json
          git commit -m "Add Elchi Client ${{ github.event.inputs.version }}" || exit 0
          for i in 1 2 3 4 5; do
            git pull --rebase --autostash origin "${GITHUB_REF_NAME:-main}" && git push && exit 0
            echo "Push rejected (attempt $i/5), retrying after rebase..."
            sleep $((RANDOM % 5 + 1))
          done
          echo "Failed to push after 5 attempts" >&2
          exit 1

  deploy:
    needs: update-index
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: main

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload to GitHub Pages
        uses: actions/upload-pages-artifact@v4
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
